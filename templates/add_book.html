{% extends "base.html" %}

{% block title %}Add Book{% endblock %}

{% block content %}

<div class="container mt-4">
    <h2 class="mb-4">Add Book</h2>

    {% if success_message %}
    <div class="alert alert-success">
        {{ success_message }}
    </div>
    {% endif %}

    <form action="/add_book" method="POST" class="card p-4 shadow-sm">

        <div class="mb-3">
            <label for="isbn" class="form-label">ISBN</label>
            <input type="text" id="isbn" name="isbn" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="title" class="form-label">Book Title</label>
            <input type="text" id="title" name="title" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="publication_year" class="form-label">Publication Year</label>
            <input type="number" id="publication_year" name="publication_year" class="form-control">
        </div>

        <div class="mb-3">
            <label for="author_id" class="form-label">Author</label>
            <select id="author_id" name="author_id" class="form-select" required>
                <option value="" selected disabled>Select an author</option>
                {% for author in authors %}
                <option value="{{ author.id }}">{{ author.name }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Add Book</button>
    </form>
</div>

{% endblock %}
