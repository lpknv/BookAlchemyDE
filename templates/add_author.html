{% extends "base.html" %}

{% block title %}Add Author{% endblock %}

{% block content %}

<div class="container mt-4">
    <h2 class="mb-4">Add Author</h2>

    {% if success_message %}
    <div class="alert alert-success">
        {{ success_message }}
    </div>
    {% endif %}

    <form action="/add_author" method="POST" class="card p-4 shadow-sm">

        <div class="mb-3">
            <label for="name" class="form-label">Author Name</label>
            <input type="text" id="name" name="name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="birthdate" class="form-label">Birthdate</label>
            <input type="date" id="birthdate" name="birthdate" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="date_of_death" class="form-label">Date of Death</label>
            <input type="date" id="date_of_death" name="date_of_death" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary">
            Add Author
        </button>

    </form>
</div>

{% endblock %}
